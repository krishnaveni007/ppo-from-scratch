# PPO hyperparameters for MuJoCo (Hopper, Walker2d, HalfCheetah, ...)
# Source: openai/baselines/ppo2/defaults.py mujoco()

env_id: Hopper-v4
total_timesteps: 1_000_000

num_envs: 1            # baselines default
num_steps: 2048

learning_rate: 3.0e-4
anneal_lr: true

gamma: 0.99
gae_lambda: 0.95

num_minibatches: 32
update_epochs: 10

norm_adv: true
clip_coef: 0.2
clip_vloss: true
ent_coef: 0.0          # entropy not used for MuJoCo
vf_coef: 0.5
max_grad_norm: 0.5
target_kl: null
